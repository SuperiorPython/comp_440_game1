<!DOCTYPE html>
<html>
<head>
  <title>Mini Pong</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    canvas {
      background: #111;
      display: block;
      margin: 30px auto;
      border: 2px solid white;
    }
  </style>
</head>
<body>
  <h1>Mini Pong</h1>
  <canvas id="gameCanvas" width="800" height="500"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "white";
      ctx.font = "30px Arial";
      ctx.fillText("Mini Pong", 330, 250);
    }

    draw();
  </script>
</body>
</html>
