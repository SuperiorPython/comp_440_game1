<!DOCTYPE html>
<html>
<head>
  <title>Mini Pong</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    canvas {
      background: #111;
      display: block;
      margin: 30px auto;
      border: 2px solid white;
    }
  </style>
</head>
<body>
  <h1>Mini Pong</h1>
  <p>Use W/S or Arrow Up/Down to move. First to 5 wins. Press Space to restart.</p>
  <canvas id="gameCanvas" width="800" height="500"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const player = {
      x: 30,
      y: 200,
      width: 15,
      height: 90,
      speed: 6
    };

    const cpu = {
      x: 755,
      y: 200,
      width: 15,
      height: 90,
      speed: 4
    };

    const ball = {
      x: 400,
      y: 250,
      size: 14,
      speedX: 5,
      speedY: 4
    };

    let playerScore = 0;
    let cpuScore = 0;
    let gameOver = false;
    let winnerText = "";

    const keys = {};

    document.addEventListener("keydown", function(event) {
      keys[event.key] = true;

      if (event.code === "Space" && gameOver) {
        restartGame();
      }
    });

    document.addEventListener("keyup", function(event) {
      keys[event.key] = false;
    });

    function restartGame() {
      playerScore = 0;
      cpuScore = 0;
      gameOver = false;
      winnerText = "";

      player.y = 200;
      cpu.y = 200;

      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;
      ball.speedX = 5;
      ball.speedY = 4;
    }

    function resetBall() {
      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;
      ball.speedX *= -1;
      ball.speedY = Math.random() > 0.5 ? 4 : -4;
    }

    function checkCollision(paddle) {
      return (
        ball.x < paddle.x + paddle.width &&
        ball.x + ball.size > paddle.x &&
        ball.y < paddle.y + paddle.height &&
        ball.y + ball.size > paddle.y
      );
    }

    function updatePlayer() {
      if (keys["w"] || keys["W"] || keys["ArrowUp"]) {
        player.y -= player.speed;
      }

      if (keys["s"] || keys["S"] || keys["ArrowDown"]) {
        player.y += player.speed;
      }

      if (player.y < 0) {
        player.y = 0;
      }

      if (player.y + player.height > canvas.height) {
        player.y = canvas.height - player.height;
      }
    }

    function updateCpu() {
      const cpuCenter = cpu.y + cpu.height / 2;
      const ballCenter = ball.y + ball.size / 2;

      if (cpuCenter < ballCenter - 10) {
        cpu.y += cpu.speed;
      } else if (cpuCenter > ballCenter + 10) {
        cpu.y -= cpu.speed;
      }

      if (cpu.y < 0) {
        cpu.y = 0;
      }

      if (cpu.y + cpu.height > canvas.height) {
        cpu.y = canvas.height - cpu.height;
      }
    }

    function updateBall() {
      ball.x += ball.speedX;
      ball.y += ball.speedY;

      if (ball.y <= 0 || ball.y + ball.size >= canvas.height) {
        ball.speedY *= -1;
      }

      if (checkCollision(player)) {
        ball.speedX = Math.abs(ball.speedX);
      }

      if (checkCollision(cpu)) {
        ball.speedX = -Math.abs(ball.speedX);
      }

      if (ball.x < 0) {
        cpuScore++;
        resetBall();
      }

      if (ball.x > canvas.width) {
        playerScore++;
        resetBall();
      }

      if (playerScore >= 5) {
        gameOver = true;
        winnerText = "You Win!";
      }

      if (cpuScore >= 5) {
        gameOver = true;
        winnerText = "CPU Wins!";
      }
    }

    function update() {
      if (gameOver) {
        return;
      }

      updatePlayer();
      updateCpu();
      updateBall();
    }

    function drawRect(rect) {
      ctx.fillStyle = "white";
      ctx.fillRect(rect.x, rect.y, rect.width, rect.height);
    }

    function drawMiddleLine() {
      ctx.setLineDash([10, 10]);
      ctx.beginPath();
      ctx.moveTo(canvas.width / 2, 0);
      ctx.lineTo(canvas.width / 2, canvas.height);
      ctx.strokeStyle = "white";
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawMiddleLine();

      drawRect(player);
      drawRect(cpu);

      ctx.fillStyle = "white";
      ctx.fillRect(ball.x, ball.y, ball.size, ball.size);

      ctx.font = "32px Arial";
      ctx.fillText(playerScore, 300, 50);
      ctx.fillText(cpuScore, 480, 50);

      if (gameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "white";
        ctx.font = "48px Arial";
        ctx.fillText(winnerText, 300, 230);

        ctx.font = "24px Arial";
        ctx.fillText("Press Space to Restart", 275, 280);
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
